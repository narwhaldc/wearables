#   Wearables index dedup maintenance — mirrors the oura_health two-pass
#   tag-then-delete pattern, targeting index=wearables. Scheduled ONE HOUR
#   LATER than the oura_health dedup jobs (Pass 1 03:00 vs oura 02:00; Pass 2
#   03:15 vs oura 02:15) so both apps can coexist on one instance without the
#   two dedup passes overlapping.
#
#   Why needed: HEC does not deduplicate; the ingest script's client-side dedup
#   store prevents most re-sends, but a reset/backfill/replay can still create
#   duplicate events in the index. Pass 2's `| delete` requires the running
#   role to hold the `can_delete` capability.

[Wearables Dedup — Pass 1: Tag Duplicates]
description = Identifies duplicate events in index=wearables by _raw content and writes their _cd \
    values to wearables_dup_events.csv — first occurrence of each _raw is kept; every later copy \
    is listed. Pass 2 reads that lookup and deletes the matching events. (Do NOT append a trailing \
    stats/outputlookup here — it would overwrite the _cd list with a summary row and Pass 2 would \
    then find nothing to delete.)
search = index=wearables \
    | streamstats count as _rank by _raw \
    | where _rank > 1 \
    | eval event_cd=_cd \
    | table event_cd \
    | outputlookup wearables_dup_events.csv
dispatch.earliest_time = 0
dispatch.latest_time = now
cron_schedule = 0 3 * * *
enableSched = 1
disabled = 0
alert.track = 0

[Wearables Dedup — Pass 2: Delete Duplicates]
description = Deletes events tagged by Pass 1. Reads wearables_dup_events.csv written by Pass 1 \
    and deletes matching events in index=wearables. If Pass 1 found no dups the lookup is empty \
    and nothing is deleted. If Pass 1 did not run, yesterday's stale _cd values point to \
    already-deleted events and match nothing. Requires can_delete capability on the running role.
search = index=wearables \
    | eval event_cd=_cd \
    | lookup wearables_dup_events.csv event_cd OUTPUT event_cd AS dup_match \
    | where isnotnull(dup_match) \
    | delete
dispatch.earliest_time = 0
dispatch.latest_time = now
cron_schedule = 15 3 * * *
enableSched = 1
disabled = 0
alert.track = 0

[Wearables Dedup — Verify: Check for Remaining Duplicates]
description = Quick health check — reports total events, unique events, duplicate count, and dup \
    percentage for index=wearables. If dup_events is 0, the index is clean. Run anytime from the \
    saved searches list.
search = index=wearables \
    | stats count as total_events dc(_raw) as unique_events \
    | eval dup_events=total_events-unique_events \
    | eval dup_pct=round(dup_events/total_events*100, 1) \
    | table total_events unique_events dup_events dup_pct
dispatch.earliest_time = 0
dispatch.latest_time = now
enableSched = 0
disabled = 0
alert.track = 0

[Wearables Registry Backup — KV Store to index]
description = Nightly backup of the KV Store registries (person/device/identity) into \
    index=wearables so the data survives a full app removal. KV collections persist \
    across app UPGRADES automatically; this backup covers the REMOVAL/reinstall case. \
    Restore (admin): search the latest backup rows for a registry and pipe to \
    outputlookup, e.g. \
    index=wearables sourcetype=wearable_registry_backup reg=person_profile \
    | dedup person_id sortby -_time | fields - _* reg | outputlookup wearable_person_profile
search = | inputlookup wearable_person_profile | eval reg="person_profile" \
    | append [ | inputlookup wearable_device_profile | eval reg="device_profile" ] \
    | append [ | inputlookup wearable_identity_map | eval reg="identity_map" ] \
    | eval _time=now() \
    | collect index=wearables sourcetype=wearable_registry_backup
dispatch.earliest_time = -1m
dispatch.latest_time = now
cron_schedule = 45 3 * * *
enableSched = 1
disabled = 0
alert.track = 0
