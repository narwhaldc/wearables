#   Registers the Wearables data model. REQUIRED — without this stanza the
#   data/models/Wearables.json definition sits on disk but is NOT registered as
#   a searchable model ("Data model 'Wearables' was not found"). acceleration=0
#   (unaccelerated); this trips the benign Cloud AppInspect disk-usage advisory
#   (check_for_datamodel_acceleration) which is unavoidable for any data-model app.
[Wearables]
acceleration = 0
