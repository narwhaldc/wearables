#   Shared cross-vendor person/device lookups (platform-level). Enrichment/identity
#   only — NOT the access gate (authorize.conf srchFilter on indexed person_id
#   enforces isolation). Backed by KV Store collections (see collections.conf) so
#   admin edits survive app upgrades. Write-locked to admin/sc_admin (see metadata).

[wearable_person_profile]
external_type = kvstore
collection = wearable_person_profile
fields_list = _key, person_id, person_name, step_goal, distance_goal_m, calorie_goal, height_cm, units
case_sensitive_match = true

[wearable_identity_map]
external_type = kvstore
collection = wearable_identity_map
fields_list = _key, vendor, vendor_user_id, person_id
case_sensitive_match = true

[wearable_device_profile]
external_type = kvstore
collection = wearable_device_profile
fields_list = _key, device_id, device_name, vendor, person_id
case_sensitive_match = true
