#   widx — the index the dashboards search (deployment knob: change this ONE line to
#   remap the whole app to a different index). Defined as index=wearables only —
#   deliberately NOT the oura+wearables union (that lives in the oura_health app),
#   because ~64% of index=oura is untagged legacy that doesn't belong in this
#   RBAC/model-clean app. Dashboard read-searches use `widx`; the dedup-maintenance
#   and registry-backup saved searches keep a literal index=wearables (they write/
#   delete on the specific index).
[widx]
definition = index=wearables
iseval = 0
