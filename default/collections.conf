#   Wearables registry collections (KV Store). Data lives in KV Store, NOT in the
#   app package -> survives app UPGRADES (unlike shipped lookups/*.csv, which the
#   package overwrites on every upgrade). Populated by admins at deployment.
#   Write is locked to admin/sc_admin via metadata (collections ACLs).

[wearable_person_profile]
field.person_id = string
field.person_name = string
field.step_goal = number
field.distance_goal_m = number
field.calorie_goal = number

[wearable_identity_map]
field.vendor = string
field.vendor_user_id = string
field.person_id = string

[wearable_device_profile]
field.device_id = string
field.device_name = string
field.vendor = string
field.person_id = string
